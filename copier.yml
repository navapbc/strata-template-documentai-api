#
# App vars
#
app_name:
  type: str
  help: The name of the app (must be valid Python module name - use underscores, not hyphens)
  validator: >-
    {% if not (app_name | regex_search('^[a-z0-9_]+$')) %}
    The app name must be a valid Python module name: only lowercase letters, digits, and underscores allowed.
    {% endif %}

app_local_port:
  type: int
  help: "The port to be used in local development of '{{ app_name }}'"
  default: 8000

_envops:
  trim_blocks: true
  lstrip_blocks: true

# ideally we could just:
#
# _answers_file: .strata-template-documentai-api/{{app_name}}.yml
#
# but alas, no:
#
# https://github.com/copier-org/copier/issues/1868

_subdirectory: template
